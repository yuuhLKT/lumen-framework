services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /app
    command: php -S 0.0.0.0:8000 -t public
    ports:
      - "${PHP_PORT:-8000}:8000"
    volumes:
      - .:/app
    environment:
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      DEV_BEARER_TOKEN: ${DEV_BEARER_TOKEN:-dev-token}
      DB_CONNECTION: ${DB_CONNECTION:-json}
      DB_JSON_PATH: ${DB_JSON_PATH:-storage/database.json}
      DB_SQLITE_PATH: ${DB_SQLITE_PATH:-storage/database.sqlite}
      DB_MYSQL_HOST: ${DB_MYSQL_HOST:-mysql}
      DB_MYSQL_PORT: ${DB_MYSQL_PORT:-3306}
      DB_MYSQL_DATABASE: ${DB_MYSQL_DATABASE:-base}
      DB_MYSQL_USERNAME: ${DB_MYSQL_USERNAME:-base}
      DB_MYSQL_PASSWORD: ${DB_MYSQL_PASSWORD:-base}
      DB_MYSQL_CHARSET: ${DB_MYSQL_CHARSET:-utf8mb4}
      DB_PGSQL_HOST: ${DB_PGSQL_HOST:-postgres}
      DB_PGSQL_PORT: ${DB_PGSQL_PORT:-5432}
      DB_PGSQL_DATABASE: ${DB_PGSQL_DATABASE:-base}
      DB_PGSQL_USERNAME: ${DB_PGSQL_USERNAME:-base}
      DB_PGSQL_PASSWORD: ${DB_PGSQL_PASSWORD:-base}

  mysql:
    image: mysql:8.4
    profiles:
      - mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_MYSQL_DATABASE:-base}
      MYSQL_USER: ${DB_MYSQL_USERNAME:-base}
      MYSQL_PASSWORD: ${DB_MYSQL_PASSWORD:-base}
      MYSQL_ROOT_PASSWORD: ${DB_MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
      - pgsql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_PGSQL_DATABASE:-base}
      POSTGRES_USER: ${DB_PGSQL_USERNAME:-base}
      POSTGRES_PASSWORD: ${DB_PGSQL_PASSWORD:-base}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_PGSQL_USERNAME:-base} -d ${DB_PGSQL_DATABASE:-base}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  postgres_data:
